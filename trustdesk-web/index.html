<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Security -->
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' blob: https://prod.spline.design; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https:; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://fonts.googleapis.com; frame-src 'none'; object-src 'none';" />

    <!-- Viewport & colour -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#050a12" />

    <!-- Primary SEO -->
    <title>TrustVault · Bank-Grade Digital Wallet &amp; Security Platform</title>
    <meta name="description" content="TrustVault is a bank-grade digital wallet with AI-powered fraud detection, virtual card management, RSA-2048 encryption, and end-to-end secure transactions. Built for Algeria's next generation of banking." />
    <meta name="keywords" content="digital wallet, secure banking, virtual cards, AI fraud detection, Algeria fintech, TrustVault, encrypted transactions, BEYN banking" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://trustvault.dz/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://trustvault.dz/" />
    <meta property="og:title" content="TrustVault · Bank-Grade Digital Wallet" />
    <meta property="og:description" content="Bank-grade digital wallet with AI-powered security, virtual card management, and end-to-end encrypted transactions." />
    <meta property="og:image" content="https://trustvault.dz/og-image.png" />
    <meta property="og:site_name" content="TrustVault" />
    <meta property="og:locale" content="en_DZ" />

    <!-- Twitter / X Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="TrustVault · Bank-Grade Digital Wallet" />
    <meta name="twitter:description" content="Bank-grade digital wallet with AI-powered security and virtual card management." />
    <meta name="twitter:image" content="https://trustvault.dz/og-image.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />

    <!-- Fonts — dns-prefetch + preconnect for minimal blocking -->
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://fonts.gstatic.com" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />

    <!-- Structured data — Organisation -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FinancialService",
      "name": "TrustVault",
      "description": "Bank-grade digital wallet and security platform for Algeria",
      "url": "https://trustvault.dz",
      "areaServed": "DZ",
      "serviceType": ["Digital Wallet", "Virtual Cards", "Fraud Detection"]
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
