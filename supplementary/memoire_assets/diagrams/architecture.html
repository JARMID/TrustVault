<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Architecture Globale – TrustDesk</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Times New Roman', serif; background: #f5f5f5; display: flex; justify-content: center; padding: 30px; }
  svg { background: white; border: 1px solid #ccc; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
</style>
</head>
<body>
<svg width="960" height="620" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#003366"/>
    </marker>
    <marker id="arrd" markerWidth="10" markerHeight="7" refX="1" refY="3.5" orient="auto">
      <polygon points="10 0, 0 3.5, 10 7" fill="#003366"/>
    </marker>
  </defs>

  <text x="480" y="30" font-size="16" font-weight="bold" fill="#003366" text-anchor="middle">Architecture Three-Tier – Plateforme TrustDesk</text>
  <line x1="40" y1="40" x2="920" y2="40" stroke="#003366" stroke-width="1.5"/>

  <!-- === LAYER 1: PRESENTATION === -->
  <rect x="30" y="55" width="900" height="160" rx="8" fill="#f0f8ff" stroke="#0066cc" stroke-width="2"/>
  <text x="40" y="72" font-size="12" font-weight="bold" fill="#0066cc">Couche Présentation (Frontend)</text>

  <!-- Flutter Mobile -->
  <rect x="60" y="85" width="190" height="115" rx="6" fill="white" stroke="#0066cc" stroke-width="1.5"/>
  <rect x="60" y="85" width="190" height="28" rx="6" fill="#0066cc"/>
  <text x="155" y="104" font-size="11" font-weight="bold" fill="white" text-anchor="middle">Application Mobile</text>
  <text x="155" y="125" font-size="10" fill="#333" text-anchor="middle">Flutter 3.x / Dart</text>
  <text x="155" y="140" font-size="10" fill="#333" text-anchor="middle">Riverpod 3.x (State)</text>
  <text x="155" y="155" font-size="10" fill="#333" text-anchor="middle">go_router / Dio / Supabase</text>
  <text x="155" y="170" font-size="10" fill="#666" text-anchor="middle">iOS & Android</text>
  <text x="155" y="185" font-size="10" fill="#666" text-anchor="middle">Dark Mode Glassmorphism UI</text>

  <!-- React Web Admin -->
  <rect x="380" y="85" width="220" height="115" rx="6" fill="white" stroke="#0066cc" stroke-width="1.5"/>
  <rect x="380" y="85" width="220" height="28" rx="6" fill="#0066cc"/>
  <text x="490" y="104" font-size="11" font-weight="bold" fill="white" text-anchor="middle">Dashboard Web Admin</text>
  <text x="490" y="125" font-size="10" fill="#333" text-anchor="middle">React.js 18 / TypeScript</text>
  <text x="490" y="140" font-size="10" fill="#333" text-anchor="middle">Vite / Recharts / Axios</text>
  <text x="490" y="155" font-size="10" fill="#333" text-anchor="middle">Lucide Icons / TailwindCSS</text>
  <text x="490" y="170" font-size="10" fill="#666" text-anchor="middle">KPIs / Incidents / KYC</text>
  <text x="490" y="185" font-size="10" fill="#666" text-anchor="middle">Responsive + SPA</text>

  <!-- Desktop (future) -->
  <rect x="720" y="85" width="185" height="115" rx="6" fill="white" stroke="#aac" stroke-width="1.5" stroke-dasharray="5,3"/>
  <rect x="720" y="85" width="185" height="28" rx="6" fill="#aac"/>
  <text x="812" y="104" font-size="11" font-weight="bold" fill="#333" text-anchor="middle">Desktop App (future)</text>
  <text x="812" y="125" font-size="10" fill="#555" text-anchor="middle">Electron / Tauri</text>
  <text x="812" y="140" font-size="10" fill="#555" text-anchor="middle">Opérateurs BEYN</text>
  <text x="812" y="155" font-size="10" fill="#777" font-style="italic" text-anchor="middle">En perspective</text>

  <!-- === LAYER 2: BUSINESS === -->
  <rect x="30" y="250" width="900" height="165" rx="8" fill="#f0fff4" stroke="#00884b" stroke-width="2"/>
  <text x="40" y="267" font-size="12" font-weight="bold" fill="#00884b">Couche Métier (Backend API)</text>

  <!-- Laravel API -->
  <rect x="60" y="278" width="260" height="125" rx="6" fill="white" stroke="#00884b" stroke-width="1.5"/>
  <rect x="60" y="278" width="260" height="28" rx="6" fill="#00884b"/>
  <text x="190" y="297" font-size="11" font-weight="bold" fill="white" text-anchor="middle">API RESTful – Laravel 11</text>
  <text x="190" y="320" font-size="10" fill="#333" text-anchor="middle">PHP 8.2 / Sanctum Auth</text>
  <text x="190" y="335" font-size="10" fill="#333" text-anchor="middle">FormRequests + withValidator</text>
  <text x="190" y="350" font-size="10" fill="#333" text-anchor="middle">Services: Wallet, Card, KYC</text>
  <text x="190" y="365" font-size="10" fill="#333" text-anchor="middle">Events / Audit Logging</text>
  <text x="190" y="385" font-size="10" fill="#555" text-anchor="middle">Rate Limit / CORS / OWASP</text>

  <!-- EncryptionService -->
  <rect x="360" y="278" width="210" height="125" rx="6" fill="white" stroke="#ff8c00" stroke-width="1.5"/>
  <rect x="360" y="278" width="210" height="28" rx="6" fill="#ff8c00"/>
  <text x="465" y="297" font-size="11" font-weight="bold" fill="white" text-anchor="middle">EncryptionService</text>
  <text x="465" y="320" font-size="10" fill="#333" text-anchor="middle">RSA-2048 (cartes)</text>
  <text x="465" y="335" font-size="10" fill="#333" text-anchor="middle">AES-256 (payloads)</text>
  <text x="465" y="350" font-size="10" fill="#333" text-anchor="middle">Clé Publique → serveur</text>
  <text x="465" y="365" font-size="10" fill="#333" text-anchor="middle">Clé Privée → Secure Enclave</text>
  <text x="465" y="385" font-size="10" fill="#555" text-anchor="middle">Zero-Knowledge Backend</text>

  <!-- AI Triage -->
  <rect x="608" y="278" width="210" height="125" rx="6" fill="white" stroke="#9b59b6" stroke-width="1.5"/>
  <rect x="608" y="278" width="210" height="28" rx="6" fill="#9b59b6"/>
  <text x="713" y="297" font-size="11" font-weight="bold" fill="white" text-anchor="middle">Moteur IA – Triage</text>
  <text x="713" y="320" font-size="10" fill="#333" text-anchor="middle">Classificateur d'intention</text>
  <text x="713" y="335" font-size="10" fill="#333" text-anchor="middle">Détection d'anomalies</text>
  <text x="713" y="350" font-size="10" fill="#333" text-anchor="middle">Score de risque (0-100)</text>
  <text x="713" y="365" font-size="10" fill="#333" text-anchor="middle">Gel automatique préventif</text>
  <text x="713" y="385" font-size="10" fill="#555" text-anchor="middle">Escalade vers admin</text>

  <!-- === LAYER 3: DATA === -->
  <rect x="30" y="450" width="900" height="150" rx="8" fill="#fff8f0" stroke="#cc5500" stroke-width="2"/>
  <text x="40" y="467" font-size="12" font-weight="bold" fill="#cc5500">Couche Données (Persistence)</text>

  <!-- MySQL -->
  <rect x="60" y="478" width="200" height="110" rx="6" fill="white" stroke="#cc5500" stroke-width="1.5"/>
  <rect x="60" y="478" width="200" height="28" rx="6" fill="#cc5500"/>
  <text x="160" y="497" font-size="11" font-weight="bold" fill="white" text-anchor="middle">MySQL 8.x</text>
  <text x="160" y="520" font-size="10" fill="#333" text-anchor="middle">Migrations Laravel</text>
  <text x="160" y="535" font-size="10" fill="#333" text-anchor="middle">Tables: users, wallets</text>
  <text x="160" y="550" font-size="10" fill="#333" text-anchor="middle">transactions, virtual_cards</text>
  <text x="160" y="565" font-size="10" fill="#333" text-anchor="middle">incidents, audit_logs, kyc</text>
  <text x="160" y="578" font-size="10" fill="#666" text-anchor="middle">Index + FK optimisés</text>

  <!-- Supabase -->
  <rect x="310" y="478" width="200" height="110" rx="6" fill="white" stroke="#3ecf8e" stroke-width="1.5"/>
  <rect x="310" y="478" width="200" height="28" rx="6" fill="#3ecf8e"/>
  <text x="410" y="497" font-size="11" font-weight="bold" fill="white" text-anchor="middle">Supabase</text>
  <text x="410" y="520" font-size="10" fill="#333" text-anchor="middle">Auth (Mobile)</text>
  <text x="410" y="535" font-size="10" fill="#333" text-anchor="middle">Realtime (wallets)</text>
  <text x="410" y="550" font-size="10" fill="#333" text-anchor="middle">PostgreSQL RLS</text>
  <text x="410" y="565" font-size="10" fill="#333" text-anchor="middle">Row Level Security</text>
  <text x="410" y="578" font-size="10" fill="#666" text-anchor="middle">Postgres Change Events</text>

  <!-- File Storage -->
  <rect x="560" y="478" width="200" height="110" rx="6" fill="white" stroke="#888" stroke-width="1.5"/>
  <rect x="560" y="478" width="200" height="28" rx="6" fill="#888"/>
  <text x="660" y="497" font-size="11" font-weight="bold" fill="white" text-anchor="middle">File Storage</text>
  <text x="660" y="520" font-size="10" fill="#333" text-anchor="middle">Supabase Storage</text>
  <text x="660" y="535" font-size="10" fill="#333" text-anchor="middle">Documents KYC</text>
  <text x="660" y="550" font-size="10" fill="#333" text-anchor="middle">Selfies biométriques</text>
  <text x="660" y="565" font-size="10" fill="#333" text-anchor="middle">Avatars utilisateurs</text>
  <text x="660" y="578" font-size="10" fill="#666" text-anchor="middle">Accès sécurisé par token</text>

  <!-- Arrows: Frontend → API -->
  <line x1="155" y1="200" x2="155" y2="278" stroke="#003366" stroke-width="2" marker-end="url(#arr)"/>
  <text x="165" y="243" font-size="9" fill="#0066cc">HTTPS REST</text>
  <line x1="490" y1="200" x2="490" y2="278" stroke="#003366" stroke-width="2" marker-end="url(#arr)"/>
  <text x="500" y="243" font-size="9" fill="#0066cc">HTTPS REST</text>

  <!-- Arrows: API → Data -->
  <line x1="190" y1="403" x2="160" y2="478" stroke="#cc5500" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="320" y1="403" x2="410" y2="478" stroke="#3ecf8e" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="430" y1="403" x2="660" y2="478" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- API internal arrows -->
  <line x1="320" y1="340" x2="360" y2="340" stroke="#ff8c00" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="570" y1="340" x2="608" y2="340" stroke="#9b59b6" stroke-width="1.5" marker-end="url(#arr)"/>
</svg>
</body>
</html>
