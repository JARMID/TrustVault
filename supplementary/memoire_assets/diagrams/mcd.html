<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Modèle Conceptuel des Données – TrustDesk</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Times New Roman', serif; background: #f5f5f5; display: flex; justify-content: center; padding: 30px; }
  svg { background: white; border: 1px solid #ccc; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
  .entity-name { font-size: 12px; font-weight: bold; fill: white; text-anchor: middle; }
  .attr { font-size: 10px; fill: #222; text-anchor: start; }
  .rel-label { font-size: 10px; fill: #003366; text-anchor: middle; font-style: italic; }
  .card { font-size: 10px; fill: #cc0000; font-weight: bold; }
</style>
</head>
<body>
<svg width="980" height="700" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="a" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#555"/>
    </marker>
  </defs>

  <text x="490" y="28" font-size="16" font-weight="bold" fill="#003366" text-anchor="middle">Modèle Conceptuel des Données (MCD) – TrustDesk</text>
  <line x1="40" y1="38" x2="940" y2="38" stroke="#003366" stroke-width="1.5"/>

  <!-- ========= ENTITIES ========= -->

  <!-- USER (center top) -->
  <g transform="translate(380, 60)">
    <rect width="200" height="160" rx="4" fill="white" stroke="#003366" stroke-width="2"/>
    <rect width="200" height="28" rx="4" fill="#003366"/>
    <text x="100" y="18" class="entity-name">USER</text>
    <line x1="0" y1="28" x2="200" y2="28" stroke="#003366" stroke-width="1"/>
    <text x="8" y="44" class="attr">• id (PK)</text>
    <text x="8" y="59" class="attr">• name</text>
    <text x="8" y="74" class="attr">• email {unique}</text>
    <text x="8" y="89" class="attr">• phone</text>
    <text x="8" y="104" class="attr">• role {admin | client}</text>
    <text x="8" y="119" class="attr">• kyc_status</text>
    <text x="8" y="134" class="attr">• is_active</text>
    <text x="8" y="149" class="attr">• avatar_url</text>
  </g>

  <!-- WALLET -->
  <g transform="translate(50, 290)">
    <rect width="185" height="140" rx="4" fill="white" stroke="#00884b" stroke-width="2"/>
    <rect width="185" height="28" rx="4" fill="#00884b"/>
    <text x="92" y="18" class="entity-name">WALLET</text>
    <line x1="0" y1="28" x2="185" y2="28" stroke="#00884b" stroke-width="1"/>
    <text x="8" y="44" class="attr">• id (PK)</text>
    <text x="8" y="59" class="attr">• balance</text>
    <text x="8" y="74" class="attr">• currency {DZD}</text>
    <text x="8" y="89" class="attr">• status</text>
    <text x="8" y="104" class="attr">• daily_limit</text>
    <text x="8" y="119" class="attr">• frozen_at</text>
    <text x="8" y="134" class="attr">• created_at</text>
  </g>

  <!-- TRANSACTION -->
  <g transform="translate(50, 510)">
    <rect width="195" height="155" rx="4" fill="white" stroke="#0066cc" stroke-width="2"/>
    <rect width="195" height="28" rx="4" fill="#0066cc"/>
    <text x="97" y="18" class="entity-name">TRANSACTION</text>
    <line x1="0" y1="28" x2="195" y2="28" stroke="#0066cc" stroke-width="1"/>
    <text x="8" y="44" class="attr">• id (PK)</text>
    <text x="8" y="59" class="attr">• type {p2p|qr|bill|topup}</text>
    <text x="8" y="74" class="attr">• amount</text>
    <text x="8" y="89" class="attr">• status</text>
    <text x="8" y="104" class="attr">• reference {uuid}</text>
    <text x="8" y="119" class="attr">• category</text>
    <text x="8" y="134" class="attr">• description</text>
    <text x="8" y="149" class="attr">• created_at</text>
  </g>

  <!-- VIRTUAL CARD -->
  <g transform="translate(380, 290)">
    <rect width="195" height="155" rx="4" fill="white" stroke="#ff8c00" stroke-width="2"/>
    <rect width="195" height="28" rx="4" fill="#ff8c00"/>
    <text x="97" y="18" class="entity-name">VIRTUAL_CARD</text>
    <line x1="0" y1="28" x2="195" y2="28" stroke="#ff8c00" stroke-width="1"/>
    <text x="8" y="44" class="attr">• id (PK)</text>
    <text x="8" y="59" class="attr">• card_number_enc</text>
    <text x="8" y="74" class="attr">• cvv_enc</text>
    <text x="8" y="89" class="attr">• expiry</text>
    <text x="8" y="104" class="attr">• status</text>
    <text x="8" y="119" class="attr">• is_disposable</text>
    <text x="8" y="134" class="attr">• public_key</text>
    <text x="8" y="149" class="attr">• created_at</text>
  </g>

  <!-- KYC_DOCUMENT -->
  <g transform="translate(720, 60)">
    <rect width="200" height="155" rx="4" fill="white" stroke="#9b59b6" stroke-width="2"/>
    <rect width="200" height="28" rx="4" fill="#9b59b6"/>
    <text x="100" y="18" class="entity-name">KYC_DOCUMENT</text>
    <line x1="0" y1="28" x2="200" y2="28" stroke="#9b59b6" stroke-width="1"/>
    <text x="8" y="44" class="attr">• id (PK)</text>
    <text x="8" y="59" class="attr">• document_type</text>
    <text x="8" y="74" class="attr">• document_url</text>
    <text x="8" y="89" class="attr">• selfie_url</text>
    <text x="8" y="104" class="attr">• liveness_score</text>
    <text x="8" y="119" class="attr">• status</text>
    <text x="8" y="134" class="attr">• reviewed_by (FK)</text>
    <text x="8" y="149" class="attr">• created_at</text>
  </g>

  <!-- INCIDENT -->
  <g transform="translate(720, 290)">
    <rect width="200" height="155" rx="4" fill="white" stroke="#cc0044" stroke-width="2"/>
    <rect width="200" height="28" rx="4" fill="#cc0044"/>
    <text x="100" y="18" class="entity-name">INCIDENT</text>
    <line x1="0" y1="28" x2="200" y2="28" stroke="#cc0044" stroke-width="1"/>
    <text x="8" y="44" class="attr">• id (PK)</text>
    <text x="8" y="59" class="attr">• type</text>
    <text x="8" y="74" class="attr">• priority</text>
    <text x="8" y="89" class="attr">• status</text>
    <text x="8" y="104" class="attr">• ai_triage_result</text>
    <text x="8" y="119" class="attr">• assigned_to (FK)</text>
    <text x="8" y="134" class="attr">• description</text>
    <text x="8" y="149" class="attr">• created_at</text>
  </g>

  <!-- AUDIT_LOG -->
  <g transform="translate(720, 520)">
    <rect width="200" height="140" rx="4" fill="white" stroke="#555" stroke-width="2"/>
    <rect width="200" height="28" rx="4" fill="#555"/>
    <text x="100" y="18" class="entity-name">AUDIT_LOG</text>
    <line x1="0" y1="28" x2="200" y2="28" stroke="#555" stroke-width="1"/>
    <text x="8" y="44" class="attr">• id (PK)</text>
    <text x="8" y="59" class="attr">• action</text>
    <text x="8" y="74" class="attr">• entity_type</text>
    <text x="8" y="89" class="attr">• entity_id</text>
    <text x="8" y="104" class="attr">• ip_address</text>
    <text x="8" y="119" class="attr">• metadata (json)</text>
    <text x="8" y="134" class="attr">• created_at</text>
  </g>

  <!-- ========= RELATIONSHIPS ========= -->
  <!-- Relation diamonds and lines -->

  <!-- USER possède WALLET (1,1)-(1,1) -->
  <line x1="380" y1="140" x2="235" y2="290" stroke="#003366" stroke-width="1.8"/>
  <polygon points="308,215 318,208 322,220" fill="#003366"/>
  <text x="240" y="205" class="rel-label">possède</text>
  <text x="370" y="160" class="card">1,1</text>
  <text x="240" y="285" class="card">1,1</text>

  <!-- USER crée VIRTUAL_CARD (1,N)-(1,1) -->
  <line x1="480" y1="220" x2="477" y2="290" stroke="#ff8c00" stroke-width="1.8"/>
  <text x="510" y="260" class="rel-label">crée</text>
  <text x="488" y="232" class="card">1,N</text>
  <text x="488" y="285" class="card">1,1</text>

  <!-- USER soumet KYC_DOCUMENT (1,N)-(1,1) -->
  <line x1="580" y1="115" x2="720" y2="115" stroke="#9b59b6" stroke-width="1.8"/>
  <text x="648" y="108" class="rel-label">soumet</text>
  <text x="582" y="128" class="card">1,N</text>
  <text x="700" y="128" class="card">1,1</text>

  <!-- USER génère INCIDENT (1,N)-(0,1) -->
  <line x1="580" y1="160" x2="720" y2="320" stroke="#cc0044" stroke-width="1.8"/>
  <text x="680" y="235" class="rel-label">génère</text>
  <text x="582" y="175" class="card">0,N</text>
  <text x="705" y="320" class="card">1,1</text>

  <!-- USER trace AUDIT_LOG (1,N)-(0,1) -->
  <line x1="580" y1="180" x2="720" y2="555" stroke="#555" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="680" y="420" class="rel-label">trace</text>
  <text x="582" y="195" class="card">0,N</text>
  <text x="702" y="560" class="card">1,1</text>

  <!-- WALLET contient TRANSACTION (1,N)-(1,1) -->
  <line x1="142" y1="430" x2="142" y2="510" stroke="#0066cc" stroke-width="1.8"/>
  <text x="152" y="475" class="rel-label">contient</text>
  <text x="152" y="427" class="card">1,N</text>
  <text x="152" y="508" class="card">1,1</text>
</svg>
</body>
</html>
