<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Diagramme de Classes – TrustDesk</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Times New Roman', serif; background: #f5f5f5; display: flex; justify-content: center; padding: 30px; }
  svg { background: white; border: 1px solid #ccc; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
</style>
</head>
<body>
<svg width="1050" height="780" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#003366"/>
    </marker>
    <marker id="diamond" markerWidth="10" markerHeight="10" refX="0" refY="5" orient="auto">
      <polygon points="0 5, 4 0, 8 5, 4 10" fill="#003366"/>
    </marker>
    <marker id="open-arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="none" stroke="#003366" stroke-width="1"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="525" y="30" font-size="16" font-weight="bold" fill="#003366" text-anchor="middle">Diagramme de Classes – TrustDesk</text>
  <line x1="60" y1="40" x2="990" y2="40" stroke="#003366" stroke-width="1.5"/>

  <!-- ===== CLASS BOXES ===== -->

  <!-- User -->
  <g transform="translate(380, 55)">
    <rect width="200" height="175" rx="4" fill="white" stroke="#003366" stroke-width="2"/>
    <rect width="200" height="30" rx="4" fill="#003366"/>
    <text x="100" y="20" font-size="13" font-weight="bold" fill="white" text-anchor="middle">User</text>
    <line x1="0" y1="30" x2="200" y2="30" stroke="#003366" stroke-width="1"/>
    <text x="8" y="48" font-size="10" fill="#333">- id: bigint {PK}</text>
    <text x="8" y="63" font-size="10" fill="#333">- name: string</text>
    <text x="8" y="78" font-size="10" fill="#333">- email: string {unique}</text>
    <text x="8" y="93" font-size="10" fill="#333">- phone: string</text>
    <text x="8" y="108" font-size="10" fill="#333">- password: string {bcrypt}</text>
    <text x="8" y="123" font-size="10" fill="#333">- role: enum {admin|client}</text>
    <text x="8" y="138" font-size="10" fill="#333">- kyc_status: enum</text>
    <line x1="0" y1="148" x2="200" y2="148" stroke="#ddd" stroke-width="1"/>
    <text x="8" y="163" font-size="10" fill="#003366">+ getWallet(): Wallet</text>
    <text x="8" y="175" font-size="10" fill="#003366">+ getCards(): VirtualCard[]</text>
  </g>

  <!-- Wallet -->
  <g transform="translate(60, 300)">
    <rect width="195" height="175" rx="4" fill="white" stroke="#00884b" stroke-width="2"/>
    <rect width="195" height="30" rx="4" fill="#00884b"/>
    <text x="97" y="20" font-size="13" font-weight="bold" fill="white" text-anchor="middle">Wallet</text>
    <line x1="0" y1="30" x2="195" y2="30" stroke="#00884b" stroke-width="1"/>
    <text x="8" y="48" font-size="10" fill="#333">- id: bigint {PK}</text>
    <text x="8" y="63" font-size="10" fill="#333">- user_id: bigint {FK}</text>
    <text x="8" y="78" font-size="10" fill="#333">- balance: decimal(15,2)</text>
    <text x="8" y="93" font-size="10" fill="#333">- currency: string</text>
    <text x="8" y="108" font-size="10" fill="#333">- status: enum</text>
    <text x="8" y="123" font-size="10" fill="#333">- daily_limit: decimal</text>
    <text x="8" y="138" font-size="10" fill="#333">- frozen_at: timestamp</text>
    <line x1="0" y1="148" x2="195" y2="148" stroke="#ddd" stroke-width="1"/>
    <text x="8" y="163" font-size="10" fill="#003366">+ debit(amount): bool</text>
    <text x="8" y="175" font-size="10" fill="#003366">+ credit(amount): bool</text>
  </g>

  <!-- Transaction -->
  <g transform="translate(60, 530)">
    <rect width="210" height="190" rx="4" fill="white" stroke="#0066cc" stroke-width="2"/>
    <rect width="210" height="30" rx="4" fill="#0066cc"/>
    <text x="105" y="20" font-size="13" font-weight="bold" fill="white" text-anchor="middle">Transaction</text>
    <line x1="0" y1="30" x2="210" y2="30" stroke="#0066cc" stroke-width="1"/>
    <text x="8" y="48" font-size="10" fill="#333">- id: bigint {PK}</text>
    <text x="8" y="63" font-size="10" fill="#333">- wallet_id: bigint {FK}</text>
    <text x="8" y="78" font-size="10" fill="#333">- type: enum {p2p|qr|bill}</text>
    <text x="8" y="93" font-size="10" fill="#333">- amount: decimal(15,2)</text>
    <text x="8" y="108" font-size="10" fill="#333">- recipient_id: bigint {FK}</text>
    <text x="8" y="123" font-size="10" fill="#333">- status: enum</text>
    <text x="8" y="138" font-size="10" fill="#333">- reference: string {uuid}</text>
    <text x="8" y="153" font-size="10" fill="#333">- category: string</text>
    <line x1="0" y1="163" x2="210" y2="163" stroke="#ddd" stroke-width="1"/>
    <text x="8" y="178" font-size="10" fill="#003366">+ execute(): bool</text>
    <text x="8" y="190" font-size="10" fill="#003366">+ reverse(): bool</text>
  </g>

  <!-- VirtualCard -->
  <g transform="translate(390, 300)">
    <rect width="200" height="190" rx="4" fill="white" stroke="#ff8c00" stroke-width="2"/>
    <rect width="200" height="30" rx="4" fill="#ff8c00"/>
    <text x="100" y="20" font-size="13" font-weight="bold" fill="white" text-anchor="middle">VirtualCard</text>
    <line x1="0" y1="30" x2="200" y2="30" stroke="#ff8c00" stroke-width="1"/>
    <text x="8" y="48" font-size="10" fill="#333">- id: bigint {PK}</text>
    <text x="8" y="63" font-size="10" fill="#333">- user_id: bigint {FK}</text>
    <text x="8" y="78" font-size="10" fill="#333">- card_number_enc: text</text>
    <text x="8" y="93" font-size="10" fill="#333">- cvv_enc: text</text>
    <text x="8" y="108" font-size="10" fill="#333">- expiry: date</text>
    <text x="8" y="123" font-size="10" fill="#333">- status: enum</text>
    <text x="8" y="138" font-size="10" fill="#333">- is_disposable: boolean</text>
    <text x="8" y="153" font-size="10" fill="#333">- public_key: text</text>
    <line x1="0" y1="163" x2="200" y2="163" stroke="#ddd" stroke-width="1"/>
    <text x="8" y="178" font-size="10" fill="#003366">+ freeze(): void</text>
    <text x="8" y="190" font-size="10" fill="#003366">+ reveal(): CardDetails</text>
  </g>

  <!-- KycDocument -->
  <g transform="translate(720, 55)">
    <rect width="210" height="175" rx="4" fill="white" stroke="#9b59b6" stroke-width="2"/>
    <rect width="210" height="30" rx="4" fill="#9b59b6"/>
    <text x="105" y="20" font-size="13" font-weight="bold" fill="white" text-anchor="middle">KycDocument</text>
    <line x1="0" y1="30" x2="210" y2="30" stroke="#9b59b6" stroke-width="1"/>
    <text x="8" y="48" font-size="10" fill="#333">- id: bigint {PK}</text>
    <text x="8" y="63" font-size="10" fill="#333">- user_id: bigint {FK}</text>
    <text x="8" y="78" font-size="10" fill="#333">- document_type: enum</text>
    <text x="8" y="93" font-size="10" fill="#333">- document_url: string</text>
    <text x="8" y="108" font-size="10" fill="#333">- selfie_url: string</text>
    <text x="8" y="123" font-size="10" fill="#333">- liveness_score: float</text>
    <text x="8" y="138" font-size="10" fill="#333">- status: enum {pending|ok}</text>
    <line x1="0" y1="148" x2="210" y2="148" stroke="#ddd" stroke-width="1"/>
    <text x="8" y="163" font-size="10" fill="#003366">+ approve(): void</text>
    <text x="8" y="175" font-size="10" fill="#003366">+ reject(reason): void</text>
  </g>

  <!-- Incident -->
  <g transform="translate(720, 300)">
    <rect width="210" height="190" rx="4" fill="white" stroke="#cc0044" stroke-width="2"/>
    <rect width="210" height="30" rx="4" fill="#cc0044"/>
    <text x="105" y="20" font-size="13" font-weight="bold" fill="white" text-anchor="middle">Incident</text>
    <line x1="0" y1="30" x2="210" y2="30" stroke="#cc0044" stroke-width="1"/>
    <text x="8" y="48" font-size="10" fill="#333">- id: bigint {PK}</text>
    <text x="8" y="63" font-size="10" fill="#333">- user_id: bigint {FK}</text>
    <text x="8" y="78" font-size="10" fill="#333">- type: enum {fraud|suspect}</text>
    <text x="8" y="93" font-size="10" fill="#333">- priority: enum {low..critical}</text>
    <text x="8" y="108" font-size="10" fill="#333">- status: enum {open|closed}</text>
    <text x="8" y="123" font-size="10" fill="#333">- assigned_to: bigint {FK}</text>
    <text x="8" y="138" font-size="10" fill="#333">- ai_triage_result: json</text>
    <text x="8" y="153" font-size="10" fill="#333">- description: text</text>
    <line x1="0" y1="163" x2="210" y2="163" stroke="#ddd" stroke-width="1"/>
    <text x="8" y="178" font-size="10" fill="#003366">+ triage(): void</text>
    <text x="8" y="190" font-size="10" fill="#003366">+ escalate(): void</text>
  </g>

  <!-- AuditLog -->
  <g transform="translate(720, 555)">
    <rect width="210" height="160" rx="4" fill="white" stroke="#555" stroke-width="2"/>
    <rect width="210" height="30" rx="4" fill="#555"/>
    <text x="105" y="20" font-size="13" font-weight="bold" fill="white" text-anchor="middle">AuditLog</text>
    <line x1="0" y1="30" x2="210" y2="30" stroke="#555" stroke-width="1"/>
    <text x="8" y="48" font-size="10" fill="#333">- id: bigint {PK}</text>
    <text x="8" y="63" font-size="10" fill="#333">- user_id: bigint {FK}</text>
    <text x="8" y="78" font-size="10" fill="#333">- action: string</text>
    <text x="8" y="93" font-size="10" fill="#333">- entity_type: string</text>
    <text x="8" y="108" font-size="10" fill="#333">- entity_id: bigint</text>
    <text x="8" y="123" font-size="10" fill="#333">- ip_address: string</text>
    <text x="8" y="138" font-size="10" fill="#333">- metadata: json</text>
    <line x1="0" y1="148" x2="210" y2="148" stroke="#ddd" stroke-width="1"/>
    <text x="8" y="160" font-size="10" fill="#003366">+ log(action): void</text>
  </g>

  <!-- ===== RELATIONSHIPS ===== -->
  <!-- User 1--1 Wallet -->
  <line x1="380" y1="145" x2="255" y2="310" stroke="#003366" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="270" y="225" font-size="10" fill="#003366">1</text>
  <text x="245" y="305" font-size="10" fill="#003366">1</text>

  <!-- User 1--* VirtualCard -->
  <line x1="480" y1="230" x2="490" y2="300" stroke="#003366" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="495" y="265" font-size="10" fill="#003366">0..*</text>

  <!-- User 1--* KycDocument -->
  <line x1="580" y1="100" x2="720" y2="100" stroke="#003366" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="645" y="94" font-size="10" fill="#003366">0..*</text>

  <!-- User 1--* Incident -->
  <line x1="580" y1="180" x2="720" y2="340" stroke="#003366" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="660" y="265" font-size="10" fill="#003366">0..*</text>

  <!-- User 1--* AuditLog -->
  <line x1="570" y1="225" x2="720" y2="575" stroke="#555" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arrow)"/>
  <text x="665" y="460" font-size="10" fill="#555">0..*</text>

  <!-- Wallet 1--* Transaction -->
  <line x1="157" y1="475" x2="157" y2="530" stroke="#0066cc" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="163" y="510" font-size="10" fill="#0066cc">0..*</text>

  <!-- Cardinality labels -->
  <text x="390" y="280" font-size="9" fill="#888" font-style="italic">possède</text>
  <text x="600" y="250" font-size="9" fill="#888" font-style="italic">crée</text>
  <text x="600" y="90" font-size="9" fill="#888" font-style="italic">soumet</text>
  <text x="100" y="510" font-size="9" fill="#888" font-style="italic">contient</text>
</svg>
</body>
</html>
