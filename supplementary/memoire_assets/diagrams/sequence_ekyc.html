<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Diagramme de Séquence – Inscription eKYC</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Times New Roman', serif; background: #f5f5f5; display: flex; justify-content: center; padding: 30px; }
  svg { background: white; border: 1px solid #ccc; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
</style>
</head>
<body>
<svg width="920" height="680" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#003366"/>
    </marker>
    <marker id="ret" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#00884b"/>
    </marker>
  </defs>

  <text x="460" y="28" font-size="16" font-weight="bold" fill="#003366" text-anchor="middle">Diagramme de Séquence – Inscription &amp; eKYC</text>
  <line x1="40" y1="38" x2="880" y2="38" stroke="#003366" stroke-width="1.5"/>

  <!-- Lifeline headers -->
  <rect x="30" y="50" width="120" height="35" rx="4" fill="#003366"/>
  <text x="90" y="72" font-size="11" font-weight="bold" fill="white" text-anchor="middle">Client Mobile</text>

  <rect x="210" y="50" width="120" height="35" rx="4" fill="#0066cc"/>
  <text x="270" y="65" font-size="10" font-weight="bold" fill="white" text-anchor="middle">Flutter App</text>
  <text x="270" y="79" font-size="9" fill="#aaddff" text-anchor="middle">(UI + Riverpod)</text>

  <rect x="395" y="50" width="130" height="35" rx="4" fill="#005588"/>
  <text x="460" y="65" font-size="10" font-weight="bold" fill="white" text-anchor="middle">Laravel API</text>
  <text x="460" y="79" font-size="9" fill="#aaddff" text-anchor="middle">(AuthController)</text>

  <rect x="585" y="50" width="120" height="35" rx="4" fill="#9b59b6"/>
  <text x="645" y="65" font-size="10" font-weight="bold" fill="white" text-anchor="middle">KycService</text>
  <text x="645" y="79" font-size="9" fill="#e8ccff" text-anchor="middle">(IA Vérification)</text>

  <rect x="770" y="50" width="110" height="35" rx="4" fill="#555"/>
  <text x="825" y="65" font-size="10" font-weight="bold" fill="white" text-anchor="middle">Database</text>
  <text x="825" y="79" font-size="9" fill="#ddd" text-anchor="middle">MySQL + Storage</text>

  <!-- Lifelines -->
  <line x1="90" y1="85" x2="90" y2="655" stroke="#003366" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="270" y1="85" x2="270" y2="655" stroke="#0066cc" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="460" y1="85" x2="460" y2="655" stroke="#005588" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="645" y1="85" x2="645" y2="655" stroke="#9b59b6" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="825" y1="85" x2="825" y2="655" stroke="#555" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- Step numbers -->
  <text x="14" y="123" font-size="10" fill="#888">1.</text>
  <text x="14" y="163" font-size="10" fill="#888">2.</text>
  <text x="14" y="203" font-size="10" fill="#888">3.</text>
  <text x="14" y="250" font-size="10" fill="#888">4.</text>
  <text x="14" y="300" font-size="10" fill="#888">5.</text>
  <text x="14" y="350" font-size="10" fill="#888">6.</text>
  <text x="14" y="400" font-size="10" fill="#888">7.</text>
  <text x="14" y="445" font-size="10" fill="#888">8.</text>
  <text x="14" y="490" font-size="10" fill="#888">9.</text>
  <text x="14" y="535" font-size="10" fill="#888">10.</text>
  <text x="14" y="575" font-size="10" fill="#888">11.</text>
  <text x="14" y="620" font-size="10" fill="#888">12.</text>

  <!-- 1: Client fills form -->
  <line x1="90" y1="118" x2="258" y2="118" stroke="#003366" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="174" y="112" font-size="10" fill="#003366" text-anchor="middle">Saisit nom, email, mot de passe</text>

  <!-- 2: POST /register -->
  <line x1="270" y1="158" x2="448" y2="158" stroke="#0066cc" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="359" y="152" font-size="10" fill="#0066cc" text-anchor="middle">POST /api/register</text>

  <!-- 3: Validate -->
  <rect x="440" y="168" width="40" height="55" fill="#cce6ff" stroke="#0066cc" stroke-width="1" rx="2"/>
  <text x="460" y="184" font-size="9" fill="#003366" text-anchor="middle">Valide</text>
  <text x="460" y="197" font-size="9" fill="#003366" text-anchor="middle">Register</text>
  <text x="460" y="210" font-size="9" fill="#003366" text-anchor="middle">Request</text>

  <!-- 4: Save user + create wallet -->
  <line x1="460" y1="240" x2="813" y2="240" stroke="#003366" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="636" y="234" font-size="10" fill="#003366" text-anchor="middle">INSERT users + wallets (balance=0)</text>

  <!-- 5: Return token -->
  <line x1="813" y1="270" x2="472" y2="270" stroke="#555" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#ret)"/>
  <text x="640" y="264" font-size="10" fill="#555" text-anchor="middle">201 Created + Sanctum token</text>

  <!-- 6: Token → App -->
  <line x1="460" y1="298" x2="282" y2="298" stroke="#555" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#ret)"/>
  <text x="371" y="292" font-size="10" fill="#555" text-anchor="middle">Token stocké (flutter_secure_storage)</text>

  <!-- --- eKYC Phase --- -->
  <rect x="80" y="315" width="820" height="16" rx="3" fill="#f0e8ff" stroke="#9b59b6" stroke-width="1"/>
  <text x="490" y="327" font-size="10" font-weight="bold" fill="#9b59b6" text-anchor="middle">— Phase eKYC —</text>

  <!-- 7: Upload CNI + selfie -->
  <line x1="90" y1="348" x2="258" y2="348" stroke="#003366" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="174" y="342" font-size="10" fill="#003366" text-anchor="middle">Photo CNI + selfie (liveness check)</text>

  <!-- 8: POST /kyc/upload -->
  <line x1="270" y1="388" x2="448" y2="388" stroke="#9b59b6" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="359" y="382" font-size="10" fill="#9b59b6" text-anchor="middle">POST /api/kyc/upload {Sanctum}</text>

  <!-- 9: API → KycService analyze -->
  <line x1="460" y1="428" x2="633" y2="428" stroke="#9b59b6" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="546" y="422" font-size="10" fill="#9b59b6" text-anchor="middle">analyze(doc, selfie)</text>

  <!-- KycService box -->
  <rect x="625" y="435" width="40" height="60" fill="#f0e8ff" stroke="#9b59b6" stroke-width="1" rx="2"/>
  <text x="645" y="452" font-size="9" fill="#9b59b6" text-anchor="middle">Score</text>
  <text x="645" y="465" font-size="9" fill="#9b59b6" text-anchor="middle">Liveness</text>
  <text x="645" y="478" font-size="9" fill="#9b59b6" text-anchor="middle">OCR</text>
  <text x="645" y="491" font-size="9" fill="#9b59b6" text-anchor="middle">Doc</text>

  <!-- 10: Save docs + status=pending -->
  <line x1="645" y1="505" x2="813" y2="505" stroke="#9b59b6" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="729" y="499" font-size="10" fill="#9b59b6" text-anchor="middle">INSERT kyc_documents (status=pending)</text>

  <!-- 11: Admin validates (async) -->
  <rect x="80" y="522" width="820" height="16" rx="3" fill="#ffe8e8" stroke="#cc0044" stroke-width="1"/>
  <text x="490" y="534" font-size="10" font-weight="bold" fill="#cc0044" text-anchor="middle">— Validation Admin (asynchrone) —</text>

  <!-- 12: Notify client KYC verified -->
  <line x1="460" y1="565" x2="282" y2="565" stroke="#00884b" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#ret)"/>
  <text x="371" y="559" font-size="10" fill="#00884b" text-anchor="middle">PATCH /api/kyc/{id}/approve → kyc_status=verified</text>

  <!-- 13: Push notification -->
  <line x1="270" y1="610" x2="102" y2="610" stroke="#00884b" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#ret)"/>
  <text x="186" y="604" font-size="10" fill="#00884b" text-anchor="middle">🔔 Notification push: "Identité vérifiée"</text>

  <!-- Activation box on API lifeline -->
  <rect x="450" y="155" width="20" height="85" fill="#cce6ff" stroke="#0066cc" stroke-width="1"/>
</svg>
</body>
</html>
