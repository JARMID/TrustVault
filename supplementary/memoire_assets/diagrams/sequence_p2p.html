<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Diagramme de Séquence – Transfert P2P</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Times New Roman', serif; background: #f5f5f5; display: flex; justify-content: center; padding: 30px; }
  svg { background: white; border: 1px solid #ccc; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
</style>
</head>
<body>
<svg width="920" height="660" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#003366"/>
    </marker>
    <marker id="ret" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#00884b"/>
    </marker>
  </defs>

  <text x="460" y="28" font-size="16" font-weight="bold" fill="#003366" text-anchor="middle">Diagramme de Séquence – Transfert P2P</text>
  <line x1="40" y1="38" x2="880" y2="38" stroke="#003366" stroke-width="1.5"/>

  <!-- Lifeline headers -->
  <rect x="40" y="50" width="110" height="35" rx="4" fill="#003366"/>
  <text x="95" y="72" font-size="11" font-weight="bold" fill="white" text-anchor="middle">Client Mobile</text>

  <rect x="220" y="50" width="110" height="35" rx="4" fill="#0066cc"/>
  <text x="275" y="72" font-size="11" font-weight="bold" fill="white" text-anchor="middle">Flutter App</text>

  <rect x="400" y="50" width="120" height="35" rx="4" fill="#005588"/>
  <text x="460" y="65" font-size="10" font-weight="bold" fill="white" text-anchor="middle">Laravel API</text>
  <text x="460" y="79" font-size="10" fill="#aaddff" text-anchor="middle">(TransferCtrl)</text>

  <rect x="590" y="50" width="110" height="35" rx="4" fill="#00884b"/>
  <text x="645" y="65" font-size="10" font-weight="bold" fill="white" text-anchor="middle">WalletService</text>
  <text x="645" y="79" font-size="10" fill="#aaffcc" text-anchor="middle">+ IA Triage</text>

  <rect x="770" y="50" width="110" height="35" rx="4" fill="#555"/>
  <text x="825" y="65" font-size="10" font-weight="bold" fill="white" text-anchor="middle">MySQL DB</text>
  <text x="825" y="79" font-size="9" fill="#ddd" text-anchor="middle">Supabase</text>

  <!-- Lifelines -->
  <line x1="95" y1="85" x2="95" y2="640" stroke="#003366" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="275" y1="85" x2="275" y2="640" stroke="#0066cc" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="460" y1="85" x2="460" y2="640" stroke="#005588" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="645" y1="85" x2="645" y2="640" stroke="#00884b" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="825" y1="85" x2="825" y2="640" stroke="#555" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- Step labels -->
  <text x="18" y="125" font-size="10" fill="#888">1.</text>
  <text x="18" y="165" font-size="10" fill="#888">2.</text>
  <text x="18" y="205" font-size="10" fill="#888">3.</text>
  <text x="18" y="255" font-size="10" fill="#888">4.</text>
  <text x="18" y="305" font-size="10" fill="#888">5.</text>
  <text x="18" y="355" font-size="10" fill="#888">6.</text>
  <text x="18" y="405" font-size="10" fill="#888">7.</text>
  <text x="18" y="455" font-size="10" fill="#888">8.</text>
  <text x="18" y="505" font-size="10" fill="#888">9.</text>
  <text x="18" y="555" font-size="10" fill="#888">10.</text>
  <text x="18" y="605" font-size="10" fill="#888">11.</text>

  <!-- 1: Client saisit montant/destinataire -->
  <line x1="95" y1="120" x2="265" y2="120" stroke="#003366" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="180" y="114" font-size="10" fill="#003366" text-anchor="middle">Saisit montant + email destinataire</text>

  <!-- 2: App → API POST /transfer -->
  <line x1="275" y1="160" x2="450" y2="160" stroke="#0066cc" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="362" y="154" font-size="10" fill="#0066cc" text-anchor="middle">POST /api/transfer {Sanctum token}</text>

  <!-- 3: API validates -->
  <rect x="440" y="175" width="40" height="60" fill="#cce6ff" stroke="#0066cc" stroke-width="1" rx="2"/>
  <text x="460" y="195" font-size="9" fill="#003366" text-anchor="middle">Valide</text>
  <text x="460" y="208" font-size="9" fill="#003366" text-anchor="middle">FormReq</text>
  <text x="460" y="221" font-size="9" fill="#003366" text-anchor="middle">withValid</text>

  <!-- 4: API → WalletService -->
  <line x1="460" y1="250" x2="635" y2="250" stroke="#003366" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="548" y="244" font-size="10" fill="#003366" text-anchor="middle">transfer(from, to, amount)</text>

  <!-- 5: WalletService → AI Triage check -->
  <rect x="625" y="265" width="40" height="65" fill="#ccffdd" stroke="#00884b" stroke-width="1" rx="2"/>
  <text x="645" y="283" font-size="9" fill="#00884b" text-anchor="middle">IA</text>
  <text x="645" y="296" font-size="9" fill="#00884b" text-anchor="middle">Triage</text>
  <text x="645" y="309" font-size="9" fill="#00884b" text-anchor="middle">Analyse</text>
  <text x="645" y="322" font-size="9" fill="#00884b" text-anchor="middle">risque</text>

  <!-- 6: Check balance + debit DB -->
  <line x1="645" y1="350" x2="815" y2="350" stroke="#00884b" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="730" y="344" font-size="10" fill="#00884b" text-anchor="middle">BEGIN TRANSACTION</text>

  <!-- 7: Debit source wallet -->
  <line x1="645" y1="390" x2="815" y2="390" stroke="#00884b" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="730" y="384" font-size="10" fill="#00884b" text-anchor="middle">UPDATE wallets SET balance-=amount</text>

  <!-- 8: Credit dest wallet -->
  <line x1="645" y1="430" x2="815" y2="430" stroke="#00884b" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="730" y="424" font-size="10" fill="#00884b" text-anchor="middle">UPDATE wallets SET balance+=amount</text>

  <!-- 9: Insert transaction + audit -->
  <line x1="645" y1="470" x2="815" y2="470" stroke="#00884b" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="730" y="464" font-size="10" fill="#00884b" text-anchor="middle">INSERT transactions + audit_logs</text>

  <!-- 10: DB confirms COMMIT -->
  <line x1="815" y1="500" x2="655" y2="500" stroke="#555" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#ret)"/>
  <text x="735" y="494" font-size="10" fill="#555" text-anchor="middle">COMMIT OK</text>

  <!-- 11: Return 201 to app -->
  <line x1="645" y1="540" x2="470" y2="540" stroke="#555" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#ret)"/>
  <line x1="460" y1="555" x2="285" y2="555" stroke="#555" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#ret)"/>
  <text x="565" y="534" font-size="10" fill="#555" text-anchor="middle">201 Created + résumé</text>

  <!-- 12: Notification -->
  <line x1="275" y1="590" x2="105" y2="590" stroke="#003366" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <text x="190" y="584" font-size="10" fill="#003366" text-anchor="middle">Notification push + mise à jour solde</text>

  <!-- Alt: suspect transaction box -->
  <rect x="588" y="260" width="180" height="10" fill="none" stroke="#ff6600" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="590" y="275" font-size="9" fill="#ff6600">alt [suspect] → gel auto + alerte admin</text>
</svg>
</body>
</html>
